<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FoodPOS Restaurante - Edición Lean/SMED</title>
    
    <link id="manifest-link" rel="manifest" href="">
    <meta name="theme-color" content="#ea580c">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081840.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        input[type="text"], input[type="number"], select { font-size: 16px !important; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased overflow-hidden">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const EXCHANGE_RATE = 8; // 8Q = $1

        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        }

        const DEFAULT_MENU = [
            { id: '1', name: 'Hamburguesa Clásica', price: 5.50, category: 'Comida', stock: 50, color: 'bg-amber-100 text-amber-800 border-amber-200' },
            { id: '2', name: 'Hamburguesa Doble', price: 7.50, category: 'Comida', stock: 30, color: 'bg-amber-200 text-amber-900 border-amber-300' },
            { id: '3', name: 'Papas Fritas', price: 2.50, category: 'Acompañamientos', stock: 100, color: 'bg-yellow-100 text-yellow-800 border-yellow-200' },
            { id: '5', name: 'Refresco Cola', price: 1.50, category: 'Bebidas', stock: 80, color: 'bg-red-100 text-red-800 border-red-200' },
        ];

        // Helper para SMED: Formatear milisegundos a minutos y segundos
        const formatTimeDiff = (start, end) => {
            if (!start || !end) return '-';
            const diffMs = new Date(end) - new Date(start);
            if (diffMs < 0) return '-';
            const mins = Math.floor(diffMs / 60000);
            const secs = Math.floor((diffMs % 60000) / 1000);
            return `${mins}m ${secs}s`;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('pos');
            const [menuItems, setMenuItems] = useLocalStorage('rest_menu_smed', DEFAULT_MENU);
            const [orders, setOrders] = useLocalStorage('rest_orders_smed', []);
            
            const [cart, setCart] = useState([]);
            const [cartStartTime, setCartStartTime] = useState(null); // SMED: Inicia cronómetro del cliente
            const [currentTable, setCurrentTable] = useState('');
            const [currentClient, setCurrentClient] = useState('');
            const [activeCategory, setActiveCategory] = useState('Todos');
            const [isMobileCartOpen, setIsMobileCartOpen] = useState(false);

            const [adminTab, setAdminTab] = useState('smed'); // sales, inventory, menu, smed
            const [newItem, setNewItem] = useState({ name: '', price: '', inputCurrency: 'Q', category: 'Comida', stock: 10 });

            useEffect(() => {
                const manifest = {
                    name: "FoodPOS Lean",
                    short_name: "FoodPOS",
                    start_url: window.location.href,
                    display: "standalone",
                    background_color: "#ffffff",
                    theme_color: "#ea580c",
                    icons: [{ src: "https://cdn-icons-png.flaticon.com/512/3081/3081840.png", sizes: "512x512", type: "image/png" }]
                };
                const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
                document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);
            }, []);

            const categories = ['Todos', ...new Set(menuItems.map(item => item.category))];
            const filteredMenu = activeCategory === 'Todos' ? menuItems : menuItems.filter(item => item.category === activeCategory);

            const addToCart = (item) => {
                // SMED: Iniciar cronómetro si es el primer artículo
                if (cart.length === 0 && !cartStartTime) {
                    setCartStartTime(new Date().toISOString());
                }

                setCart(prev => {
                    const existing = prev.find(i => i.id === item.id);
                    if (existing) return prev.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i);
                    return [...prev, { ...item, quantity: 1 }];
                });
            };

            const updateCartQuantity = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQ = item.quantity + delta;
                        return newQ > 0 ? { ...item, quantity: newQ } : item;
                    }
                    return item;
                }));
            };

            const removeFromCart = (id) => setCart(prev => prev.filter(item => item.id !== id));

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const totalItemsInCart = cart.reduce((sum, item) => sum + item.quantity, 0);

            const handleCheckout = () => {
                if (cart.length === 0) return alert('El carrito está vacío');
                if (!currentTable && !currentClient) return alert('Ingrese Mesa o Nombre del Cliente');

                const now = new Date().toISOString();
                
                const newOrder = {
                    id: Math.random().toString(36).substr(2, 9),
                    table: currentTable || 'Llevar',
                    client: currentClient || 'Sin Nombre',
                    items: cart,
                    total: cartTotal,
                    status: 'pending', // pending -> preparing -> ready -> delivered -> paid
                    timestamp: now,
                    // SMED MOTOR DE TIEMPOS
                    timestamps: {
                        started: cartStartTime || now, // Tiempo que empezó a pedir
                        sent: now,                     // Tiempo que se envió a cocina
                        preparing: null,               // Cuando el chef empieza
                        ready: null,                   // Cuando el chef termina
                        delivered: null,               // Cuando el mesero lo entrega en mesa
                        paid: null                     // Cuando el cajero cobra
                    }
                };

                setOrders([newOrder, ...orders]);
                
                const updatedMenu = [...menuItems];
                cart.forEach(cartItem => {
                    const menuIdx = updatedMenu.findIndex(m => m.id === cartItem.id);
                    if (menuIdx >= 0) {
                        updatedMenu[menuIdx].stock = Math.max(0, updatedMenu[menuIdx].stock - cartItem.quantity);
                    }
                });
                setMenuItems(updatedMenu);

                // Reset
                setCart([]);
                setCartStartTime(null);
                setCurrentTable('');
                setCurrentClient('');
                setIsMobileCartOpen(false);
                alert('¡Pedido enviado a cocina!');
            };

            const activeOrders = orders.filter(o => o.status !== 'delivered' && o.status !== 'paid');
            const deliveredOrders = orders.filter(o => o.status === 'delivered'); // Entregados, listos para cobrar
            const completedOrders = orders.filter(o => o.status === 'paid');      // Pagados, venta finalizada
            
            // Calculamos ingresos basados en los pagados
            const totalRevenue = completedOrders.reduce((sum, o) => sum + o.total, 0);

            const updateOrderStatus = (orderId, newStatus) => {
                const now = new Date().toISOString();
                setOrders(prev => prev.map(o => {
                    if (o.id === orderId) {
                        const updatedOrder = { ...o, status: newStatus };
                        if (!updatedOrder.timestamps) updatedOrder.timestamps = {};
                        updatedOrder.timestamps[newStatus] = now; // Guardar el timestamp exacto del evento
                        return updatedOrder;
                    }
                    return o;
                }));
            };

            const handleStockUpdate = (id, delta) => {
                setMenuItems(prev => prev.map(item => {
                    if (item.id === id) return { ...item, stock: Math.max(0, item.stock + delta) };
                    return item;
                }));
            };

            const getStatusColor = (status) => {
                switch(status) {
                    case 'pending': return 'bg-red-50 border-red-200 text-red-800';
                    case 'preparing': return 'bg-yellow-50 border-yellow-200 text-yellow-800';
                    case 'ready': return 'bg-green-50 border-green-200 text-green-800';
                    default: return 'bg-gray-50 border-gray-200 text-gray-800';
                }
            };

            return (
                <div className="h-screen flex flex-col bg-white text-gray-900 overflow-hidden selection:bg-orange-200">
                    <nav className="h-16 bg-gray-900 text-white flex items-center justify-between px-3 sm:px-6 shadow-md z-30 shrink-0">
                        <div className="flex items-center gap-2 sm:gap-3">
                            <div className="bg-orange-600 p-1.5 sm:p-2 rounded-lg"><i className="fas fa-utensils"></i></div>
                            <h1 className="text-lg sm:text-xl font-black tracking-tight">Food<span className="text-orange-500">POS</span></h1>
                        </div>
                        
                        <div className="flex bg-gray-800 p-1 rounded-lg">
                            <button onClick={() => setActiveTab('pos')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 rounded-md font-medium transition-all ${activeTab === 'pos' ? 'bg-orange-600 shadow-md' : 'text-gray-300'}`}>
                                <i className="fas fa-tablet-screen-button"></i> <span className="hidden sm:inline">Mesas</span>
                            </button>
                            <button onClick={() => setActiveTab('kitchen')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 rounded-md font-medium transition-all ${activeTab === 'kitchen' ? 'bg-orange-600 shadow-md' : 'text-gray-300'}`}>
                                <i className="fas fa-fire-burner"></i> <span className="hidden sm:inline">Cocina</span>
                                {activeOrders.filter(o => o.status === 'pending').length > 0 && (
                                    <span className="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full ml-1 animate-pulse">{activeOrders.filter(o => o.status === 'pending').length}</span>
                                )}
                            </button>
                            <button onClick={() => setActiveTab('admin')} className={`flex items-center gap-2 px-3 sm:px-4 py-2 rounded-md font-medium transition-all ${activeTab === 'admin' ? 'bg-orange-600 shadow-md' : 'text-gray-300'}`}>
                                <i className="fas fa-chart-pie"></i> <span className="hidden sm:inline">Gestión</span>
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 overflow-hidden relative">
                        {/* ==================== POS ==================== */}
                        {activeTab === 'pos' && (
                            <div className="flex h-full bg-gray-50 relative">
                                <div className="flex-1 flex flex-col h-full w-full">
                                    <div className="bg-white p-3 sm:p-4 border-b flex gap-2 overflow-x-auto shrink-0 shadow-sm">
                                        {categories.map(cat => (
                                            <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-4 py-2 rounded-full font-bold whitespace-nowrap text-sm sm:text-base transition-colors ${activeCategory === cat ? 'bg-gray-900 text-white shadow-md' : 'bg-gray-100 text-gray-600'}`}>
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                    
                                    <div className="flex-1 overflow-y-auto p-3 sm:p-4 pb-24 lg:pb-4">
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3 sm:gap-4">
                                            {filteredMenu.map(item => {
                                                const cartItem = cart.find(c => c.id === item.id);
                                                const qtyInCart = cartItem ? cartItem.quantity : 0;
                                                const hasStock = item.stock > 0;

                                                return (
                                                    <div key={item.id} className={`p-3 sm:p-4 rounded-xl border flex flex-col items-start justify-between h-40 shadow-sm ${!hasStock && qtyInCart===0 ? 'opacity-50 bg-gray-100' : 'bg-white'}`}>
                                                        <div className="flex justify-between w-full mb-2">
                                                            <span className={`text-[10px] sm:text-xs px-2 py-1 rounded-md border font-bold truncate ${item.color}`}>{item.category}</span>
                                                            <span className={`text-[10px] sm:text-xs font-bold ${hasStock ? 'text-gray-400' : 'text-red-500'}`}>{hasStock ? `Stock: ${item.stock}` : 'Agotado'}</span>
                                                        </div>
                                                        <span className="font-bold text-gray-800 text-sm sm:text-base leading-tight line-clamp-2">{item.name}</span>
                                                        
                                                        <div className="flex justify-between w-full mt-auto items-end">
                                                            <div className="flex flex-col">
                                                                <span className="text-orange-600 font-black text-base sm:text-lg leading-none mb-1">${item.price.toFixed(2)}</span>
                                                                <span className="text-gray-500 font-bold text-[11px] sm:text-xs leading-none">Q{(item.price * EXCHANGE_RATE).toFixed(2)}</span>
                                                            </div>
                                                            <div className="flex items-center bg-gray-50 border rounded-lg p-1">
                                                                <button onClick={() => { if(qtyInCart===1) removeFromCart(item.id); else if(qtyInCart>1) updateCartQuantity(item.id, -1); }} disabled={qtyInCart===0} className={`p-1 sm:p-1.5 rounded-md ${qtyInCart>0 ? 'text-orange-600 bg-white shadow-sm' : 'text-gray-300'}`}>
                                                                    <i className="fas fa-minus text-xs"></i>
                                                                </button>
                                                                <span className="w-6 sm:w-8 text-center font-black text-sm sm:text-lg text-gray-800">{qtyInCart}</span>
                                                                <button onClick={() => { if(qtyInCart<item.stock) qtyInCart===0 ? addToCart(item) : updateCartQuantity(item.id, 1); }} disabled={qtyInCart>=item.stock} className={`p-1 sm:p-1.5 rounded-md ${qtyInCart<item.stock ? 'text-orange-600 bg-white shadow-sm' : 'text-gray-300'}`}>
                                                                    <i className="fas fa-plus text-xs"></i>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="lg:hidden absolute bottom-0 left-0 w-full p-4 bg-white/90 backdrop-blur-md border-t z-10">
                                        <button onClick={() => setIsMobileCartOpen(true)} className="w-full bg-orange-600 text-white font-black py-3.5 rounded-xl flex justify-between items-center px-6 shadow-lg">
                                            <div className="flex items-center gap-3">
                                                <i className="fas fa-shopping-cart text-lg"></i> Ver Pedido
                                                {totalItemsInCart > 0 && <span className="bg-white text-orange-600 px-2.5 py-0.5 rounded-full text-sm">{totalItemsInCart}</span>}
                                            </div>
                                            <div className="flex flex-col items-end text-right">
                                                <span className="text-xl leading-none mb-1">${cartTotal.toFixed(2)}</span>
                                                <span className="text-sm font-bold text-orange-200 leading-none">Q{(cartTotal * EXCHANGE_RATE).toFixed(2)}</span>
                                            </div>
                                        </button>
                                    </div>
                                </div>

                                <div className={`fixed inset-0 z-50 bg-white flex flex-col shadow-2xl transition-transform duration-300 ${isMobileCartOpen ? 'translate-y-0' : 'translate-y-full'} lg:relative lg:translate-y-0 lg:w-96 lg:border-l lg:z-20 shrink-0`}>
                                    <div className="p-4 bg-gray-900 text-white flex items-center justify-between shrink-0">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><i className="fas fa-receipt text-orange-500"></i> Pedido Actual</h2>
                                        <div className="flex items-center gap-3">
                                            <span className="bg-gray-800 px-3 py-1 rounded-full text-sm font-bold">{totalItemsInCart} items</span>
                                            <button onClick={() => setIsMobileCartOpen(false)} className="lg:hidden p-1.5 bg-gray-800 hover:bg-gray-700 rounded-lg text-white">
                                                <i className="fas fa-times"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div className="p-4 border-b space-y-3 bg-gray-50 shrink-0">
                                        <div className="flex items-center bg-white border-2 border-gray-200 rounded-xl px-3 py-2.5 focus-within:border-orange-500">
                                            <i className="fas fa-hashtag text-gray-400 mr-2"></i>
                                            <input type="text" placeholder="Número de Mesa" value={currentTable} onChange={(e) => setCurrentTable(e.target.value)} className="w-full outline-none bg-transparent font-bold"/>
                                        </div>
                                        <div className="flex items-center bg-white border-2 border-gray-200 rounded-xl px-3 py-2.5 focus-within:border-orange-500">
                                            <i className="fas fa-user text-gray-400 mr-2"></i>
                                            <input type="text" placeholder="Nombre del Cliente" value={currentClient} onChange={(e) => setCurrentClient(e.target.value)} className="w-full outline-none bg-transparent font-bold"/>
                                        </div>
                                        {/* Indicador visual de tiempo de pedido para SMED */}
                                        {cartStartTime && (
                                            <div className="text-xs text-orange-600 font-bold text-center bg-orange-100 rounded p-1">
                                                <i className="fas fa-stopwatch"></i> Cronómetro iniciado
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-white">
                                        {cart.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-gray-400">
                                                <i className="fas fa-clipboard-list text-6xl opacity-20 text-orange-600 mb-4"></i>
                                                <p className="font-bold text-lg">Tu orden está vacía</p>
                                            </div>
                                        ) : cart.map(item => (
                                            <div key={item.id} className="flex flex-col bg-white border-2 border-gray-100 rounded-xl p-3">
                                                <div className="flex justify-between font-black text-gray-800 mb-2">
                                                    <span className="truncate pr-2">{item.name}</span>
                                                    <div className="flex flex-col items-end">
                                                        <span className="text-orange-600 leading-none mb-1">${(item.price * item.quantity).toFixed(2)}</span>
                                                        <span className="text-xs text-gray-500 font-bold leading-none">Q{(item.price * item.quantity * EXCHANGE_RATE).toFixed(2)}</span>
                                                    </div>
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-sm text-gray-500 font-bold">${item.price.toFixed(2)} c/u</span>
                                                    <div className="flex items-center gap-1 bg-gray-50 rounded-lg p-1 border">
                                                        <button onClick={() => updateCartQuantity(item.id, -1)} className="p-1"><i className="fas fa-minus text-xs"></i></button>
                                                        <span className="w-8 text-center font-black">{item.quantity}</span>
                                                        <button onClick={() => updateCartQuantity(item.id, 1)} disabled={item.quantity >= item.stock} className="p-1"><i className="fas fa-plus text-xs"></i></button>
                                                        <div className="w-px h-5 bg-gray-300 mx-1"></div>
                                                        <button onClick={() => removeFromCart(item.id)} className="p-1 text-red-400"><i className="fas fa-trash text-xs"></i></button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="p-4 border-t bg-gray-50 shrink-0 pb-safe">
                                        <div className="flex justify-between items-end mb-4 px-2">
                                            <span className="text-gray-500 font-black uppercase text-sm">Total</span>
                                            <div className="flex flex-col items-end">
                                                <span className="text-4xl font-black text-gray-800 leading-none mb-1">${cartTotal.toFixed(2)}</span>
                                                <span className="text-lg font-bold text-gray-500 leading-none">Q{(cartTotal * EXCHANGE_RATE).toFixed(2)}</span>
                                            </div>
                                        </div>
                                        <button onClick={handleCheckout} className="w-full bg-orange-600 hover:bg-orange-700 text-white py-4 rounded-xl font-black text-lg flex items-center justify-center gap-2 shadow-lg">
                                            <i className="fas fa-bell"></i> Enviar a Cocina
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ==================== KDS (COCINA) ==================== */}
                        {activeTab === 'kitchen' && (
                            <div className="p-4 sm:p-6 h-full overflow-y-auto bg-gray-100 pb-20">
                                <div className="mb-6 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">
                                    <h2 className="text-xl sm:text-2xl font-bold text-gray-800 flex items-center gap-2">
                                        <i className="fas fa-fire-burner text-orange-600"></i> Monitoreo KDS
                                    </h2>
                                    <div className="flex gap-2 sm:gap-4 overflow-x-auto pb-2 sm:pb-0">
                                        <span className="px-4 py-1.5 bg-red-100 text-red-800 rounded-full text-xs sm:text-sm font-bold shadow-sm border border-red-200 whitespace-nowrap">
                                            Pendientes: {activeOrders.filter(o=>o.status==='pending').length}
                                        </span>
                                        <span className="px-4 py-1.5 bg-yellow-100 text-yellow-800 rounded-full text-xs sm:text-sm font-bold shadow-sm border border-yellow-200 whitespace-nowrap">
                                            En Proceso: {activeOrders.filter(o=>o.status==='preparing').length}
                                        </span>
                                    </div>
                                </div>

                                {activeOrders.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center h-64 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-300 mx-4">
                                        <i className="fas fa-check-circle text-6xl mb-4 opacity-50 text-green-500"></i>
                                        <p className="text-lg sm:text-xl font-medium text-center px-4">¡Excelente trabajo! No hay pedidos pendientes.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
                                        {activeOrders.map(order => {
                                            const timeString = new Date(order.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                                            
                                            return (
                                                <div key={order.id} className={`flex flex-col rounded-xl border-2 shadow-md overflow-hidden ${getStatusColor(order.status)}`}>
                                                    <div className={`p-4 border-b-2 flex justify-between items-center ${getStatusColor(order.status).replace('text-', 'border-').replace('50', '200')}`}>
                                                        <div>
                                                            <span className="text-xs font-bold uppercase tracking-wider opacity-75">Orden #{order.id}</span>
                                                            <h3 className="text-lg sm:text-xl font-black">{order.table !== 'Llevar' ? `Mesa ${order.table}` : order.table}</h3>
                                                        </div>
                                                        <div className="flex flex-col items-end">
                                                            <span className="flex items-center gap-1 text-sm font-bold"><i className="fas fa-clock"></i> {timeString}</span>
                                                            <span className="text-sm font-medium opacity-80">{order.client}</span>
                                                        </div>
                                                    </div>

                                                    <div className="p-4 flex-1 bg-white/60">
                                                        <ul className="space-y-3">
                                                            {order.items.map((item, idx) => (
                                                                <li key={idx} className="flex justify-between items-start text-base sm:text-lg font-bold text-gray-800 border-b border-gray-200/50 pb-2 last:border-0 last:pb-0">
                                                                    <span className="flex gap-3 items-center">
                                                                        <span className="bg-gray-800 text-white rounded-md px-2.5 py-0.5 min-w-[36px] text-center font-black shadow-sm">{item.quantity}</span>
                                                                        {item.name}
                                                                    </span>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    </div>

                                                    <div className="p-3 bg-white border-t flex gap-2">
                                                        {order.status === 'pending' && (
                                                            <button onClick={() => updateOrderStatus(order.id, 'preparing')} className="flex-1 bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-lg font-bold shadow-md sm:text-lg">
                                                                Empezar a Preparar
                                                            </button>
                                                        )}
                                                        {order.status === 'preparing' && (
                                                            <button onClick={() => updateOrderStatus(order.id, 'ready')} className="flex-1 bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-bold shadow-md sm:text-lg">
                                                                <i className="fas fa-check-circle"></i> ¡Pedido Listo!
                                                            </button>
                                                        )}
                                                        {order.status === 'ready' && (
                                                            <button onClick={() => updateOrderStatus(order.id, 'delivered')} className="flex-1 bg-gray-900 hover:bg-black text-white py-3 rounded-lg font-bold shadow-md sm:text-lg">
                                                                <i className="fas fa-hand-holding-heart"></i> Entregar a Mesa
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ==================== ADMIN & SMED ==================== */}
                        {activeTab === 'admin' && (
                            <div className="p-4 sm:p-6 h-full overflow-y-auto bg-gray-50 pb-20">
                                <div className="max-w-6xl mx-auto">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 sm:mb-8 gap-4">
                                        <h2 className="text-2xl sm:text-3xl font-bold text-gray-800 flex items-center gap-2 sm:gap-3">
                                            <i className="fas fa-store text-orange-600"></i> Gestión General
                                        </h2>
                                        <div className="flex bg-white rounded-lg p-1.5 shadow-sm border overflow-x-auto w-full md:w-auto">
                                            <button onClick={() => setAdminTab('smed')} className={`flex items-center gap-2 px-4 py-2 sm:py-2.5 rounded-md font-bold transition-colors whitespace-nowrap ${adminTab === 'smed' ? 'bg-orange-100 text-orange-800' : 'text-gray-500'}`}>
                                                <i className="fas fa-stopwatch"></i> Eficiencia SMED
                                            </button>
                                            <button onClick={() => setAdminTab('sales')} className={`flex items-center gap-2 px-4 py-2 sm:py-2.5 rounded-md font-bold transition-colors whitespace-nowrap ${adminTab === 'sales' ? 'bg-gray-900 text-white' : 'text-gray-500'}`}>
                                                <i className="fas fa-cash-register"></i> Cobros & Ventas
                                            </button>
                                            <button onClick={() => setAdminTab('inventory')} className={`flex items-center gap-2 px-4 py-2 sm:py-2.5 rounded-md font-bold transition-colors whitespace-nowrap ${adminTab === 'inventory' ? 'bg-gray-900 text-white' : 'text-gray-500'}`}>
                                                <i className="fas fa-box"></i> Stock
                                            </button>
                                            <button onClick={() => setAdminTab('menu')} className={`flex items-center gap-2 px-4 py-2 sm:py-2.5 rounded-md font-bold transition-colors whitespace-nowrap ${adminTab === 'menu' ? 'bg-gray-900 text-white' : 'text-gray-500'}`}>
                                                <i className="fas fa-list"></i> Menú
                                            </button>
                                        </div>
                                    </div>

                                    {/* --- NUEVA PESTAÑA: EFICIENCIA SMED --- */}
                                    {adminTab === 'smed' && (
                                        <div className="space-y-6">
                                            <div className="bg-orange-600 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden">
                                                <i className="fas fa-tachometer-alt absolute -right-4 -bottom-4 text-9xl opacity-10"></i>
                                                <h3 className="text-2xl font-black mb-2">Panel de Eficiencia Operativa (SMED)</h3>
                                                <p className="font-medium opacity-90">Análisis en tiempo real de los cuellos de botella desde que el cliente piensa su pedido hasta que paga.</p>
                                            </div>

                                            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                                                <div className="p-5 border-b bg-gray-50/50 flex justify-between items-center">
                                                    <h3 className="font-bold text-gray-800 text-lg">Tiempos Registrados por Pedido</h3>
                                                    <span className="text-xs font-bold bg-blue-100 text-blue-800 px-3 py-1 rounded-full">Automático</span>
                                                </div>
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left border-collapse min-w-[800px]">
                                                        <thead className="bg-gray-50 text-gray-500 text-xs border-b">
                                                            <tr>
                                                                <th className="p-4 font-bold uppercase tracking-wider">Mesa/ID</th>
                                                                <th className="p-4 font-bold uppercase tracking-wider text-center" title="Desde el primer toque en menú hasta 'Enviar a Cocina'">Toma Pedido<br/>(Elección)</th>
                                                                <th className="p-4 font-bold uppercase tracking-wider text-center" title="Desde enviado hasta que chef presiona 'Preparar'">Espera KDS<br/>(Reacción)</th>
                                                                <th className="p-4 font-bold uppercase tracking-wider text-center" title="Desde 'Preparar' hasta '¡Listo!'">Preparación<br/>(Cocina)</th>
                                                                <th className="p-4 font-bold uppercase tracking-wider text-center" title="Desde '¡Listo!' hasta ser Entregado">Entrega<br/>(Mesero)</th>
                                                                <th className="p-4 font-bold uppercase tracking-wider text-center bg-gray-100" title="Desde 'Entregado' hasta 'Cobrar'">Tiempo de Pago<br/>(Caja)</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-gray-100">
                                                            {orders.filter(o => o.timestamps).length === 0 ? (
                                                                <tr><td colSpan="6" className="p-8 text-center text-gray-400 font-medium">No hay pedidos con registro de tiempo aún.</td></tr>
                                                            ) : (
                                                                orders.filter(o => o.timestamps).map(order => {
                                                                    const t = order.timestamps;
                                                                    return (
                                                                    <tr key={order.id} className="hover:bg-gray-50/80 transition-colors">
                                                                        <td className="p-4">
                                                                            <div className="font-black text-gray-800">{order.table}</div>
                                                                            <div className="text-xs text-gray-400">#{order.id}</div>
                                                                        </td>
                                                                        <td className="p-4 text-center font-bold text-blue-600">{formatTimeDiff(t.started, t.sent)}</td>
                                                                        <td className="p-4 text-center font-bold text-red-500">{formatTimeDiff(t.sent, t.preparing)}</td>
                                                                        <td className="p-4 text-center font-bold text-orange-500">{formatTimeDiff(t.preparing, t.ready)}</td>
                                                                        <td className="p-4 text-center font-bold text-yellow-600">{formatTimeDiff(t.ready, t.delivered)}</td>
                                                                        <td className="p-4 text-center font-black text-green-600 bg-green-50/30">{formatTimeDiff(t.delivered, t.paid)}</td>
                                                                    </tr>
                                                                    )
                                                                })
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* --- VENTAS Y COBROS --- */}
                                    {adminTab === 'sales' && (
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6">
                                                <div className="bg-white p-5 rounded-2xl border border-green-100 shadow-sm flex items-center gap-5">
                                                    <div className="p-3 bg-green-100 text-green-600 rounded-xl"><i className="fas fa-dollar-sign text-2xl"></i></div>
                                                    <div>
                                                        <p className="text-gray-500 text-xs font-bold uppercase tracking-wider">Caja Fuerte (Pagado)</p>
                                                        <p className="text-2xl font-black text-gray-800 leading-none mb-1">${totalRevenue.toFixed(2)}</p>
                                                        <p className="text-sm font-bold text-gray-500">Q{(totalRevenue * EXCHANGE_RATE).toFixed(2)}</p>
                                                    </div>
                                                </div>
                                                <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-5">
                                                    <div className="p-3 bg-blue-100 text-blue-600 rounded-xl"><i className="fas fa-receipt text-2xl"></i></div>
                                                    <div>
                                                        <p className="text-gray-500 text-xs font-bold uppercase tracking-wider">Cuentas Abiertas</p>
                                                        <p className="text-2xl font-black text-gray-800">{deliveredOrders.length}</p>
                                                    </div>
                                                </div>
                                                <div className="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-5">
                                                    <div className="p-3 bg-orange-100 text-orange-600 rounded-xl"><i className="fas fa-utensils text-2xl"></i></div>
                                                    <div>
                                                        <p className="text-gray-500 text-xs font-bold uppercase tracking-wider">Ventas Finalizadas</p>
                                                        <p className="text-2xl font-black text-gray-800 leading-none mb-1">{completedOrders.length}</p>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* SECCIÓN DE COBRO DE MESAS (NUEVO) */}
                                            {deliveredOrders.length > 0 && (
                                                <div className="bg-yellow-50 rounded-2xl border border-yellow-200 shadow-sm overflow-hidden">
                                                    <div className="p-4 border-b border-yellow-200 bg-yellow-100 flex justify-between items-center">
                                                        <h3 className="font-black text-yellow-800 text-lg"><i className="fas fa-exclamation-triangle"></i> Cuentas por Cobrar (Entregadas)</h3>
                                                    </div>
                                                    <div className="p-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                        {deliveredOrders.map(order => (
                                                            <div key={order.id} className="bg-white p-4 rounded-xl border border-yellow-200 shadow-sm flex justify-between items-center">
                                                                <div>
                                                                    <div className="font-black text-lg">Mesa {order.table}</div>
                                                                    <div className="text-sm text-gray-500">{order.client}</div>
                                                                </div>
                                                                <div className="text-right flex items-center gap-4">
                                                                    <div>
                                                                        <div className="font-black text-xl text-gray-800">${order.total.toFixed(2)}</div>
                                                                        <div className="font-bold text-sm text-gray-500">Q{(order.total * EXCHANGE_RATE).toFixed(2)}</div>
                                                                    </div>
                                                                    <button onClick={() => updateOrderStatus(order.id, 'paid')} className="bg-green-600 hover:bg-green-700 text-white p-3 rounded-lg font-black shadow-md">
                                                                        <i className="fas fa-cash-register"></i> Cobrar
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                                                <div className="p-5 border-b bg-gray-50/50">
                                                    <h3 className="font-bold text-gray-800 text-lg">Historial de Ventas Pagadas</h3>
                                                </div>
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left border-collapse">
                                                        <thead className="bg-gray-50 text-gray-500 text-sm border-b">
                                                            <tr>
                                                                <th className="p-4 font-bold uppercase">ID Orden</th>
                                                                <th className="p-4 font-bold uppercase">Cliente / Mesa</th>
                                                                <th className="p-4 font-bold uppercase">Total (USD)</th>
                                                                <th className="p-4 font-bold uppercase">Total (QTZ)</th>
                                                                <th className="p-4 font-bold uppercase text-center">Estado</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-gray-100">
                                                            {completedOrders.length === 0 ? (
                                                                <tr><td colSpan="5" className="p-8 text-center text-gray-400 font-medium">No hay ventas cobradas aún.</td></tr>
                                                            ) : (
                                                                completedOrders.map(order => (
                                                                    <tr key={order.id} className="hover:bg-gray-50/80 transition-colors">
                                                                        <td className="p-4 font-bold text-gray-800">#{order.id}</td>
                                                                        <td className="p-4 text-gray-600 font-medium">{order.client} - {order.table}</td>
                                                                        <td className="p-4 font-black text-green-600">${order.total.toFixed(2)}</td>
                                                                        <td className="p-4 font-black text-gray-600">Q{(order.total * EXCHANGE_RATE).toFixed(2)}</td>
                                                                        <td className="p-4 text-center"><span className="bg-green-100 text-green-800 px-3 py-1 rounded-full text-xs font-black"><i className="fas fa-check"></i> Pagado</span></td>
                                                                    </tr>
                                                                ))
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* --- INVENTARIO --- */}
                                    {adminTab === 'inventory' && (
                                        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                                            <div className="p-5 border-b bg-gray-50/50">
                                                <h3 className="font-bold text-gray-800 text-lg">Control Rápido de Stock</h3>
                                            </div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left">
                                                    <thead className="bg-gray-50 text-gray-500 text-sm border-b">
                                                        <tr>
                                                            <th className="p-4 font-bold uppercase tracking-wider">Producto</th>
                                                            <th className="p-4 font-bold uppercase tracking-wider text-center">Stock Actual</th>
                                                            <th className="p-4 font-bold uppercase tracking-wider text-center">Ajustar Stock</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-gray-100">
                                                        {menuItems.map(item => (
                                                            <tr key={item.id} className={`hover:bg-gray-50/80 transition-colors ${item.stock <= 5 ? 'bg-red-50/30' : ''}`}>
                                                                <td className="p-4 font-bold text-gray-800 flex items-center gap-2">
                                                                    {item.stock <= 5 && <i className="fas fa-exclamation-circle text-red-500"></i>}
                                                                    {item.name}
                                                                </td>
                                                                <td className="p-4 text-center">
                                                                    <span className={`text-xl font-black ${item.stock <= 5 ? 'text-red-600' : 'text-gray-800'}`}>
                                                                        {item.stock}
                                                                    </span>
                                                                </td>
                                                                <td className="p-4">
                                                                    <div className="flex items-center justify-center gap-2">
                                                                        <button onClick={() => handleStockUpdate(item.id, -1)} className="p-2.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 transition-colors active:scale-90 shadow-sm">
                                                                            <i className="fas fa-minus text-sm"></i>
                                                                        </button>
                                                                        <button onClick={() => handleStockUpdate(item.id, 1)} className="p-2.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-600 transition-colors active:scale-90 shadow-sm">
                                                                            <i className="fas fa-plus text-sm"></i>
                                                                        </button>
                                                                        <button onClick={() => handleStockUpdate(item.id, 10)} className="px-3 py-2 bg-orange-100 hover:bg-orange-200 rounded-lg text-orange-700 text-sm font-black transition-colors active:scale-90 shadow-sm">
                                                                            +10
                                                                        </button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                    {/* --- MENÚ --- */}
                                    {adminTab === 'menu' && (
                                        <div className="space-y-6">
                                            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 relative overflow-hidden">
                                                <div className="absolute top-0 left-0 w-2 h-full bg-orange-500"></div>
                                                <h3 className="font-bold text-gray-800 text-lg mb-5 flex items-center gap-2">
                                                    <i className="fas fa-plus text-orange-600"></i> Crear Nuevo Botón
                                                </h3>
                                                <form onSubmit={handleAddProduct} className="grid grid-cols-1 md:grid-cols-4 gap-5 items-end">
                                                    <div className="col-span-1 md:col-span-2">
                                                        <label className="block text-sm font-bold text-gray-600 mb-1.5">Nombre</label>
                                                        <input type="text" value={newItem.name} onChange={e => setNewItem({...newItem, name: e.target.value})} className="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:border-orange-500 bg-white font-medium" placeholder="Ej. Tacos al Pastor" required />
                                                    </div>
                                                    <div className="col-span-1 md:col-span-2 flex gap-2">
                                                        <div className="w-1/3">
                                                            <label className="block text-sm font-bold text-gray-600 mb-1.5">Moneda</label>
                                                            <select value={newItem.inputCurrency} onChange={e => setNewItem({...newItem, inputCurrency: e.target.value})} className="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:border-orange-500 bg-white font-bold text-gray-800">
                                                                <option value="Q">Q (Quetzal)</option>
                                                                <option value="USD">$ (Dólar)</option>
                                                            </select>
                                                        </div>
                                                        <div className="w-2/3">
                                                            <label className="block text-sm font-bold text-gray-600 mb-1.5">Precio</label>
                                                            <input type="number" step="0.01" value={newItem.price} onChange={e => setNewItem({...newItem, price: e.target.value})} className="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:border-orange-500 bg-white font-medium" placeholder="0.00" required />
                                                        </div>
                                                    </div>
                                                    <div className="col-span-1 md:col-span-2">
                                                        <label className="block text-sm font-bold text-gray-600 mb-1.5">Categoría</label>
                                                        <input type="text" value={newItem.category} onChange={e => setNewItem({...newItem, category: e.target.value})} className="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:border-orange-500 bg-white font-medium" placeholder="Ej. Bebidas" required />
                                                    </div>
                                                    <div className="col-span-1 md:col-span-1">
                                                        <label className="block text-sm font-bold text-gray-600 mb-1.5">Stock</label>
                                                        <input type="number" value={newItem.stock} onChange={e => setNewItem({...newItem, stock: e.target.value})} className="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 outline-none focus:border-orange-500 bg-white font-medium" required />
                                                    </div>
                                                    <div className="col-span-1 md:col-span-1">
                                                        <button type="submit" className="w-full bg-gray-900 hover:bg-black text-white font-black py-3 rounded-xl shadow-md active:scale-95 flex justify-center gap-2">
                                                            <i className="fas fa-save"></i> Guardar
                                                        </button>
                                                    </div>
                                                </form>
                                            </div>

                                            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                                                <div className="p-5 border-b bg-gray-50/50">
                                                    <h3 className="font-bold text-gray-800 text-lg">Botones Actuales</h3>
                                                </div>
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left">
                                                        <thead className="bg-gray-50 text-gray-500 text-sm border-b">
                                                            <tr>
                                                                <th className="p-4 font-bold uppercase">Producto</th>
                                                                <th className="p-4 font-bold uppercase">Precio ($)</th>
                                                                <th className="p-4 font-bold uppercase">Precio (Q)</th>
                                                                <th className="p-4 font-bold uppercase text-center">Eliminar</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-gray-100">
                                                            {menuItems.map(item => (
                                                                <tr key={item.id} className="hover:bg-gray-50/80 transition-colors">
                                                                    <td className="p-4 font-bold text-gray-800">{item.name}</td>
                                                                    <td className="p-4 font-black text-gray-600">${item.price.toFixed(2)}</td>
                                                                    <td className="p-4 font-black text-orange-600">Q{(item.price * EXCHANGE_RATE).toFixed(2)}</td>
                                                                    <td className="p-4 text-center">
                                                                        <button onClick={() => handleDeleteProduct(item.id)} className="p-2.5 bg-red-50 hover:bg-red-500 text-red-600 hover:text-white rounded-lg shadow-sm">
                                                                            <i className="fas fa-trash"></i>
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
